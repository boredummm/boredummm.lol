<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>photos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas class="shader-canvas" data-shader-canvas aria-hidden="true"></canvas>
  <canvas class="particle-canvas" data-particle-canvas aria-hidden="true"></canvas>

  <main class="card">
    <h1>photos</h1>
    <p class="tag">random pics / moments</p>

    <section class="gallery">
      <img src="photo1.JPG" alt="photo 1">
      <img src="photo2.JPG" alt="photo 2">
      <img src="photo3.JPG" alt="photo 3">
    </section>

    <a href="index.html">back</a>
  </main>
  <div class="photo-lightbox" data-photo-lightbox hidden aria-hidden="true" role="dialog" aria-modal="true" aria-label="photo viewer">
    <button class="lightbox-close" type="button" data-lightbox-close aria-label="close photo">×</button>
    <button class="lightbox-nav lightbox-prev" type="button" data-lightbox-prev aria-label="previous photo">‹</button>
    <figure class="lightbox-frame">
      <img class="lightbox-image" data-lightbox-image alt="">
      <figcaption class="lightbox-caption" data-lightbox-caption></figcaption>
    </figure>
    <button class="lightbox-nav lightbox-next" type="button" data-lightbox-next aria-label="next photo">›</button>
  </div>
  <aside class="now-playing" aria-live="polite">
    <a class="now-cover-link" data-now-link href="https://www.last.fm" target="_blank" rel="noreferrer">
      <span class="now-cover-fallback">fm</span>
      <img class="now-cover" data-now-cover alt="" decoding="async">
    </a>
    <div class="now-info">
      <p class="now-label"><span></span><span data-now-status>last.fm scrobble</span></p>
      <a class="now-track" data-now-track href="https://www.last.fm" target="_blank" rel="noreferrer">connect Last.fm</a>
      <p class="now-artist" data-now-artist>add your username + API key</p>
    </div>
  </aside>
  <script src="script.js"></script>
</body>
</html>
